# OutreachOS nginx reverse proxy config.
# Installed by deploy/oracle-setup.sh to /etc/nginx/sites-available/outreach.
# The placeholder SERVER_NAME_PLACEHOLDER is sed-replaced with the real domain.
# Certbot appends SSL/443 server block automatically when it runs.

server {
    listen 80;
    server_name SERVER_NAME_PLACEHOLDER;

    # Generous body size for resume PDF uploads (10 MB limit in multer,
    # this is a safety buffer for base64-encoded uploads).
    client_max_body_size 50M;

    # Health check — respond fast, don't log every hit (keep-alive cron would
    # spam the log)
    location = /api/health {
        access_log off;
        proxy_pass http://127.0.0.1:3001/api/health;
        proxy_read_timeout 10s;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (manual refresh endpoint streams progress events)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # Long-running scrapes can take minutes; allow generous timeouts
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 30s;
    }

    # Gzip text responses
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # Basic security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
