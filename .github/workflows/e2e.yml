# Nightly Playwright e2e suite against production.
#
# Runs at 09:00 UTC daily (≈04:00 ET, when traffic is lowest). Manual runs
# allowed via workflow_dispatch.
#
# Required secrets:
#   E2E_TEST_EMAIL / E2E_TEST_PASSWORD — shared e2e account credentials.
#                       Password auth mints a fresh session on every run.
#   E2E_SUPABASE_PUBLISHABLE_KEY — Supabase API key that starts with
#                       sb_publishable_. Required now that legacy JWT-based
#                       anon keys are disabled.
#   SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY — used by scripts/seed-e2e-fixtures.mjs
#                       to seed the deep-audit fixtures (jobs row + queued
#                       Auto Apply evaluation) before each run.
# Optional:
#   E2E_SECOND_TEST_EMAIL / E2E_SECOND_TEST_PASSWORD — enables two-user
#                       write/read isolation coverage.
#   run_real_apify (workflow_dispatch input) — opt into spending Apify quota
#                       for the real-scrape gate on a manual run. Defaults off.
#   vars.E2E_RUN_REAL_APIFY=1 — same opt-in via repo variable for scheduled runs.

name: e2e
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      run_real_apify:
        description: 'Spend Apify quota on the real-scrape gate'
        required: false
        type: boolean
        default: false

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Root package-lock.json is gitignored, so use `npm install` not `npm ci`.
      - name: Install root deps
        run: npm install --no-audit --no-fund

      - name: Install chromium
        run: npx playwright install --with-deps chromium

      # Idempotently seed the deep-audit fixtures: a jobs row (unlocks the
      # application-tracking Save gate) and a queued Auto Apply evaluation
      # against a fresh Greenhouse URL (unlocks the Auto Apply dry-run gate).
      # Skips silently if SUPABASE_SERVICE_ROLE_KEY isn't configured.
      - name: Seed e2e fixtures
        id: seed
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_TEST_EMAIL:            ${{ secrets.E2E_TEST_EMAIL }}
        run: node scripts/seed-e2e-fixtures.mjs

      - name: Run e2e suite against prod
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.E2E_SUPABASE_PUBLISHABLE_KEY }}
          E2E_SECOND_TEST_EMAIL: ${{ secrets.E2E_SECOND_TEST_EMAIL }}
          E2E_SECOND_TEST_PASSWORD: ${{ secrets.E2E_SECOND_TEST_PASSWORD }}
          # Prefer the seed step output; fall back to the repo variable so the
          # gate also works when seeding is disabled but a fixed eval id is set.
          E2E_AUTO_APPLY_EVAL_ID: ${{ steps.seed.outputs.eval_id || vars.E2E_AUTO_APPLY_EVAL_ID }}
          # Opt into the quota-spending Apify scrape via either the manual
          # workflow_dispatch checkbox or the repo variable.
          E2E_RUN_REAL_APIFY: ${{ (inputs.run_real_apify == true && '1') || vars.E2E_RUN_REAL_APIFY }}
          E2E_BACKEND_URL: ${{ vars.E2E_BACKEND_URL }}
        run: npm run test:e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
